# ─────────────────────────────────────────────────────────────────────────────
# Questionnaire YAML schema — example.yaml
#
# Text fields ("TextValue") can be:
#   - A plain string:              title: "My Question"
#   - A bilingual object:          title: {en: "My Question", zh: "我的问题"}
#
# If ANY text field in the file is a bilingual object, the language bar is
# shown in the UI so respondents can switch between EN / 中文 / both.
#
# Required top-level keys: meta, sections
# Optional top-level key:  summary
# ─────────────────────────────────────────────────────────────────────────────

# ── meta (required) ──────────────────────────────────────────────────────────
meta:
  title:
    en: "Sample Feedback Survey"
    zh: "示例反馈问卷"
  organization:
    en: "Example Organization"
    zh: "示例组织"

# ── sections (required) ──────────────────────────────────────────────────────
sections:
  - id: "1"
    title:
      en: "General Experience"
      zh: "整体体验"
    description:
      en: "Please share your overall impressions."
      zh: "请分享您的整体印象。"
    questions:
      - id: "Q1.1"
        title:
          en: "How would you rate the overall experience?"
          zh: "您如何评价整体体验？"
        prompts:
          - en: "Consider all aspects of the experience"
            zh: "请考虑体验的各个方面"

      - id: "Q1.2"
        title:
          en: "What was the highlight for you?"
          zh: "您认为最精彩的部分是什么？"

      - id: "Q1.3"
        type: single-choice
        title:
          en: "How did you hear about us?"
          zh: "您是如何了解到我们的？"
        options:
          - en: "Social media"
            zh: "社交媒体"
          - en: "Friend or colleague"
            zh: "朋友或同事"
          - en: "Online search"
            zh: "网络搜索"
          - en: "Other"
            zh: "其他"

      - id: "Q1.4"
        type: score
        title:
          en: "How satisfied are you overall? (1–5 stars)"
          zh: "您的整体满意度如何？（1–5 星）"

  - id: "2"
    title:
      en: "Suggestions"
      zh: "改进建议"
    questions:
      - id: "Q2.1"
        title:
          en: "What improvements would you suggest?"
          zh: "您有哪些改进建议？"
        context:
          en: "Be as specific as possible."
          zh: "请尽量具体。"

      - id: "Q2.2"
        type: multiple-choice
        title:
          en: "Which areas need the most improvement? (select all that apply)"
          zh: "哪些方面最需要改进？（可多选）"
        options:
          - en: "Communication"
            zh: "沟通交流"
          - en: "Speed / efficiency"
            zh: "速度与效率"
          - en: "Quality of output"
            zh: "成果质量"
          - en: "Support & follow-up"
            zh: "支持与跟进"

      - id: "Q2.3"
        type: true-false
        title:
          en: "Would you recommend us to a friend or colleague?"
          zh: "您会向朋友或同事推荐我们吗？"

      - id: "Q2.4"
        type: ranking
        title:
          en: "Please rank the following factors by importance to you (drag to reorder)."
          zh: "请按照对您的重要程度对以下因素排序（拖动排序）。"
        items:
          - en: "Price"
            zh: "价格"
          - en: "Quality"
            zh: "质量"
          - en: "Speed"
            zh: "速度"
          - en: "Customer support"
            zh: "客户支持"

      - id: "Q2.5"
        type: text
        title:
          en: "If you would NOT recommend us, please explain why."
          zh: "如果您不会推荐我们，请说明原因。"
        condition:
          question: "Q2.3"
          equals: "false"
        disabled_message:
          en: 'This question is only available if you answered "No" to the previous question.'
          zh: '此题仅在您对上一题回答「否」时开放。'

# ── summary (optional) ───────────────────────────────────────────────────────
summary:
  title:
    en: "Final Thoughts"
    zh: "总结意见"
  description:
    en: "Please add any other comments."
    zh: "如有其他意见，请在此填写。"
  questions:
    - id: "S1"
      type: text
      title:
        en: "Any additional comments?"
        zh: "还有其他意见吗？"
